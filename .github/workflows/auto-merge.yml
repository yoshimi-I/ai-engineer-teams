name: Auto Merge

on:
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.review.state == 'approved' || github.event_name == 'check_suite'
    steps:
      - name: Merge approved PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find PRs that are approved and all checks passed
          prs=$(gh pr list --repo ${{ github.repository }} --json number,reviewDecision --jq '.[] | select(.reviewDecision == "APPROVED") | .number')
          for pr in $prs; do
            echo "Attempting to merge PR #$pr"
            gh pr merge "$pr" --repo ${{ github.repository }} --squash --delete-branch || echo "Failed to merge PR #$pr (likely has conflicts or pending checks)"
          done

      - name: Auto-merge Dependabot PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prs=$(gh pr list --repo ${{ github.repository }} --author "app/dependabot" --json number,title --jq '.[].number')
          for pr in $prs; do
            # Only merge patch/minor updates
            title=$(gh pr view "$pr" --repo ${{ github.repository }} --json title --jq '.title')
            if echo "$title" | grep -qiE "bump.*from.*to|update.*from.*to"; then
              echo "Auto-merging Dependabot PR #$pr: $title"
              gh pr review "$pr" --repo ${{ github.repository }} --approve --body "Auto-approved Dependabot update"
              gh pr merge "$pr" --repo ${{ github.repository }} --squash --delete-branch || echo "Failed to merge Dependabot PR #$pr"
            fi
          done
