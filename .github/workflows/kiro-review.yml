name: Kiro Review + Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [develop]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck + BATS
        run: sudo apt-get update && sudo apt-get install -y shellcheck bats
      - name: Check shell syntax
        run: find scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Run ShellCheck
        run: shellcheck -x -P scripts scripts/*.sh scripts/lib/*.sh
      - name: Run BATS unit tests
        run: bats scripts/tests/*.bats

  # Review: only on PR open or /review comment
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/review'))
    steps:
      - name: Resolve PR target
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.ref }}"
            sha="${{ github.event.pull_request.head.sha }}"
          else
            base=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json baseRefName --jq '.baseRefName')
            sha=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          if [ "$base" = "develop" ]; then
            echo "reviewable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reviewable=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.pr.outputs.reviewable == 'true'
        with:
          ref: ${{ steps.pr.outputs.sha }}
      - uses: konippi/kiro-cli-review-action@v1
        if: steps.pr.outputs.reviewable == 'true'
        with:
          kiro_api_key: ${{ secrets.KIRO_API_KEY }}
          trigger_phrase: /review
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # Auto-merge: only when a review is submitted as APPROVED
  auto-merge:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      github.event.pull_request.base.ref == 'develop'
    steps:
      - name: Squash merge approved PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr=${{ github.event.pull_request.number }}
          echo "Merging PR #$pr"
          gh pr merge "$pr" --repo ${{ github.repository }} --squash --delete-branch \
            || echo "Cannot merge PR #$pr yet (conflicts or pending checks)"
