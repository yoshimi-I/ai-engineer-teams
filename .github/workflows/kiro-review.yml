name: Kiro Review + Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [develop]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  # Re-evaluate merge readiness when CI completes. Without this, an approval
  # submitted while CI was still pending would never retry once CI finishes.
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck + BATS
        run: sudo apt-get update && sudo apt-get install -y shellcheck bats
      - name: Check shell syntax
        run: find scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Run ShellCheck
        run: shellcheck -x -P scripts scripts/*.sh scripts/lib/*.sh
      - name: Run BATS unit tests
        run: bats scripts/tests/*.bats

  # Review: only on PR open or /review comment
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/review'))
    steps:
      - name: Resolve PR target
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.ref }}"
            sha="${{ github.event.pull_request.head.sha }}"
          else
            base=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json baseRefName --jq '.baseRefName')
            sha=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          if [ "$base" = "develop" ]; then
            echo "reviewable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reviewable=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.pr.outputs.reviewable == 'true'
        with:
          ref: ${{ steps.pr.outputs.sha }}
      - uses: konippi/kiro-cli-review-action@v1
        if: steps.pr.outputs.reviewable == 'true'
        with:
          kiro_api_key: ${{ secrets.KIRO_API_KEY }}
          trigger_phrase: /review
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # ── Auto-merge ─────────────────────────────────────────────────────────
  #
  # Trigger matrix:
  #   * pull_request_review: submitted (approved)
  #       → a reviewer just approved. Queue auto-merge; GitHub will merge
  #         once remaining checks pass.
  #   * check_suite: completed (conclusion=success)
  #       → CI just finished. Re-check approved PRs on the same head SHA
  #         and queue auto-merge for any that are newly mergeable.
  #
  # Primary merge path: `gh pr merge --auto --squash --delete-branch`.
  # GitHub's auto-merge owns the retry loop; our job only has to enable it
  # (or merge right away when all conditions are already satisfied). This
  # replaces the previous design where we exited non-zero on "pending
  # checks" and silently never retried.
  #
  # Requirements on the repo (surfaced as a clear error when missing):
  #   - Settings → General → "Allow auto-merge" enabled
  #   - Branch protection on `develop` with required status checks + review
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      (github.event_name == 'pull_request_review' &&
        github.event.review.state == 'approved' &&
        github.event.pull_request.base.ref == 'develop') ||
      (github.event_name == 'check_suite' &&
        github.event.check_suite.conclusion == 'success')
    steps:
      - name: Resolve target PR(s)
        id: prs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            pull_request_review)
              # Single PR, taken from the event payload.
              echo "numbers=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
              ;;
            check_suite)
              # Find any APPROVED PRs whose head SHA matches the completed
              # check_suite. Only develop-bound PRs are auto-mergeable here.
              head_sha="${{ github.event.check_suite.head_sha }}"
              numbers=$(gh pr list --repo "$REPO" --base develop \
                --state open --json number,reviewDecision,headRefOid \
                --jq "[.[] | select(.headRefOid == \"$head_sha\" and .reviewDecision == \"APPROVED\") | .number] | join(\",\")")
              if [ -z "$numbers" ]; then
                echo "No approved develop PRs match head_sha=${head_sha}; nothing to do."
                echo "numbers=" >> "$GITHUB_OUTPUT"
              else
                echo "numbers=$numbers" >> "$GITHUB_OUTPUT"
              fi
              ;;
          esac

      - name: Enable auto-merge (squash) on each target PR
        if: steps.prs.outputs.numbers != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          NUMBERS: ${{ steps.prs.outputs.numbers }}
        run: |
          set -euo pipefail
          IFS=',' read -ra prs <<< "$NUMBERS"
          for pr in "${prs[@]}"; do
            echo "::group::PR #${pr}"

            # Sanity-check: the validate check-run must have succeeded on
            # this PR's head SHA before we queue a merge. This is redundant
            # with branch protection but catches mis-configurations where
            # validate is not a required check.
            sha=$(gh pr view "$pr" --repo "$REPO" --json headRefOid --jq '.headRefOid')
            validate_conclusion=$(gh api "repos/${REPO}/commits/${sha}/check-runs" \
              --jq '[.check_runs[] | select(.name == "validate")] | map(.conclusion) | .[0] // "missing"')
            if [ "$validate_conclusion" != "success" ]; then
              echo "::warning::PR #${pr}: validate check is ${validate_conclusion}; skipping."
              echo "::endgroup::"
              continue
            fi

            # Queue auto-merge via GitHub's native feature. If all checks
            # already pass, this merges immediately; otherwise it waits and
            # GitHub retries automatically.
            if gh pr merge "$pr" --repo "$REPO" --auto --squash --delete-branch; then
              echo "✓ auto-merge enabled (or merged) for PR #${pr}"
            else
              # `gh pr merge --auto` fails when "Allow auto-merge" is not
              # enabled in repo settings, or when the PR is already merged,
              # or on conflicts. Surface this loudly instead of silently
              # treating the workflow as green.
              gh pr comment "$pr" --repo "$REPO" --body \
                "🔴 auto-merge could not be queued. Enable \"Allow auto-merge\" in repo settings and ensure branch protection on \`develop\` requires the \`validate\` check, or merge this PR manually."
              echo "::error::gh pr merge --auto failed for PR #${pr}"
              echo "::endgroup::"
              exit 1
            fi
            echo "::endgroup::"
          done
