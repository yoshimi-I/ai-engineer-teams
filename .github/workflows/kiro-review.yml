name: Kiro Review + Auto Merge

on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Check shell syntax
        run: find scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Run ShellCheck
        run: shellcheck -x -P scripts scripts/*.sh scripts/lib/*.sh

  # Review: only on PR open or /review comment
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/review'))
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || '' }}
      - uses: konippi/kiro-cli-review-action@v1
        with:
          kiro_api_key: ${{ secrets.KIRO_API_KEY }}
          trigger_phrase: /review
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # Auto-merge: only when a review is submitted as APPROVED
  auto-merge:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved'
    steps:
      - name: Squash merge approved PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr=${{ github.event.pull_request.number }}
          echo "Merging PR #$pr"
          gh pr merge "$pr" --repo ${{ github.repository }} --squash --delete-branch \
            || echo "Cannot merge PR #$pr yet (conflicts or pending checks)"
