name: Promote develop to main

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-promotion:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Check shell syntax
        run: find scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Run ShellCheck
        run: shellcheck -x -P scripts scripts/*.sh scripts/lib/*.sh
      - name: Run promotion E2E
        env:
          KIRO_E2E_COMMAND: ${{ vars.KIRO_E2E_COMMAND }}
        run: |
          if [ -n "${KIRO_E2E_COMMAND:-}" ]; then
            eval "$KIRO_E2E_COMMAND"
          elif [ -f justfile ] && command -v just >/dev/null 2>&1 && just --list 2>/dev/null | grep -q '^    e2e'; then
            just e2e
          elif [ -f package.json ] && jq -e '.scripts.e2e' package.json >/dev/null; then
            corepack enable
            if [ -f pnpm-lock.yaml ]; then
              pnpm install --frozen-lockfile
              pnpm e2e
            elif [ -f yarn.lock ]; then
              yarn install --frozen-lockfile
              yarn e2e
            elif [ -f package-lock.json ]; then
              npm ci
              npm run e2e
            else
              npm install
              npm run e2e
            fi
          elif [ -f scripts/check.sh ]; then
            ./scripts/check.sh
          else
            echo "::warning::No E2E command found. Set repository variable KIRO_E2E_COMMAND."
          fi

  create-promotion-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Create or update promotion PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          existing=$(gh pr list --repo "$REPO" --head develop --base main --state open --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            echo "Promotion PR already exists: #$existing"
            exit 0
          fi
          gh pr create \
            --repo "$REPO" \
            --head develop \
            --base main \
            --title "chore: promote develop to main" \
            --body "Promote the E2E-verified develop branch to main."
